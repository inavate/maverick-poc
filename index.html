<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Payments</title>
    <!-- Include Maverick JS Library -->
    <script src="https://dashboard.maverickpayments.com/js/HostedFields.js"></script>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div class="modal">
        <div class="modal-header">
            <div>
                <h1>Card Payments — POC</h1>
            </div>
            <button class="modal-close" aria-label="Close" onclick="resetForm()">&times;</button>
        </div>

        <div class="modal-body">
            <div id="error-display" class="msg error" role="alert"></div>
            <div id="success-display" class="msg success" role="status"></div>

            <!-- Unified Payment Form -->
            <div id="step-card" class="card-form-area">
                <!-- Payment Amount & Description -->
                <div class="row">
                    <div class="field">
                        <label class="form-label">Payment Amount (USD)<span class="req">*</span></label>
                        <input type="number" id="payment-amount" class="charge-input" min="0.01" step="0.01"
                            value="25.00" style="font-size: 1.1rem; font-weight: bold; color: #111827;" />
                    </div>
                </div>

                <hr style="margin: 1.25rem 0; border: 0; border-top: 1px solid #e5e7eb;" />

                <!-- Hosted Fields Card Elements -->
                <div class="field">
                    <label class="form-label">Name on Card<span class="req">*</span></label>
                    <div id="card-holder-name" class="maverick-input-container"></div>
                </div>
                <div class="field">
                    <label class="form-label">Credit Card Number<span class="req">*</span></label>
                    <div id="card-number" class="maverick-input-container"></div>
                </div>
                <div class="row">
                    <div class="field">
                        <label class="form-label">Expiration (MM/YY)<span class="req">*</span></label>
                        <div id="card-expiration" class="maverick-input-container"></div>
                    </div>
                    <div class="field">
                        <label class="form-label">CVV<span class="req">*</span></label>
                        <div id="card-cvv" class="maverick-input-container"></div>
                    </div>
                </div>
                <!-- Unified container for the submit button to overlay our styled button and Maverick's iframe -->
                <div id="submit-btn-wrapper"
                    style="position: relative; width: 100%; height: 42px; margin-top: 1.25rem;">
                    <!-- Our beautiful native button -->
                    <button type="button" id="custom-pay-button" class="btn-primary"
                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">
                        Pay Now
                    </button>
                    <!-- Maverick's submit iframe will be rendered inside this div on top of our button, but invisible -->
                    <div id="submit-button"
                        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; cursor: pointer;">
                    </div>
                </div>
            </div>
        </div>
    </div>    <script src="/app.js"></script>
</body>
</html>
